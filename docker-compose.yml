version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tooneytracker_db
    environment:
      POSTGRES_USER: tooney
      POSTGRES_PASSWORD: tooney123
      POSTGRES_DB: tooneytracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: